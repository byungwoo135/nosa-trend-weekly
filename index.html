<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>노사동향 위클리</title>
<style>
  @font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
    font-weight: 45 920;
  }
  :root {
    /* Kurly Nextmile BI Guideline: Main Color = Kurly Purple, Sub Color = Nextmile Orange */
    --purple: #5f0080;
    --purple-2: #3d0053;
    --orange: #ff7b3c;
    --ink: #16213e;
    --sub: #5b6474;
    --line: #e7e9ee;
    --paper: #f7f8fb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SD산돌고딕Neo1', 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  header {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-2) 100%);
    color: #fff;
    padding: 64px 24px 44px;
    text-align: center;
    border-bottom: 5px solid var(--orange);
  }
  header .eyebrow {
    font-family: 'GT America', 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--orange);
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 34px;
    font-weight: 800;
  }
  header p {
    margin-top: 10px;
    font-size: 15px;
    color: #e3c6f0;
  }
  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px;
  }
  .card-link {
    display: block;
    text-decoration: none;
    color: inherit;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card-link:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(16, 27, 51, 0.12);
  }
  .card-link img {
    width: 100%;
    aspect-ratio: 1080 / 1350;
    object-fit: cover;
    display: block;
    background: var(--paper);
  }
  .card-meta {
    padding: 14px 16px 18px;
  }
  .card-meta .week {
    font-size: 13px;
    color: var(--sub);
    font-weight: 600;
  }
  .card-meta .range {
    margin-top: 4px;
    font-size: 15px;
    font-weight: 700;
  }
  .empty {
    text-align: center;
    color: var(--sub);
    padding: 60px 0;
  }
</style>
</head>
<body>
  <header>
    <div class="eyebrow">WEEKLY HR TREND REPORT</div>
    <h1>노사동향 위클리</h1>
    <p>유통업계와 타 산업군 노사동향을 매주 한 장으로 정리합니다</p>
  </header>
  <main>
    <div class="grid" id="archive">
      <!-- WEEKLY_REPORT_ENTRIES -->
      <a class="card-link" href="reports/2026-07-13_2026-07-19.html">
        <img src="reports/2026-07-13_2026-07-19.png" alt="2026.07.13 ~ 2026.07.19 노사동향 리포트" loading="lazy" />
        <div class="card-meta">
          <div class="week">WEEKLY REPORT</div>
          <div class="range">2026.07.13 ~ 2026.07.19</div>
        </div>
      </a>
      <a class="card-link" href="reports/2026-07-06_2026-07-12.html">
        <img src="reports/2026-07-06_2026-07-12.png" alt="2026.07.06 ~ 2026.07.12 노사동향 리포트" loading="lazy" />
        <div class="card-meta">
          <div class="week">WEEKLY REPORT</div>
          <div class="range">2026.07.06 ~ 2026.07.12</div>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
