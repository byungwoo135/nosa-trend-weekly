<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>노사동향 리포트</title>
<style>
  @font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
    font-weight: 45 920;
  }
  :root {
    /* Kurly Nextmile BI Guideline: Main Color = Kurly Purple, Sub Color = Nextmile Orange */
    --purple: #5f0080;
    --purple-2: #3d0053;
    --orange: #ff7b3c;
    --orange-text: #b8501a;   /* darkened for AA text contrast on light bg */
    --ink: #16213e;
    --sub: #5b6474;
    --line: #e7e9ee;
    --paper: #f7f8fb;
    --retail: var(--purple);        /* 유통업계 accent */
    --retail-bg: #f2e6f7;
    --other: var(--orange-text);    /* 타 산업군 accent */
    --other-bg: #fdeee0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1350px;
    font-family: 'SD산돌고딕Neo1', 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow: hidden;
  }
  .card {
    width: 1080px; height: 1350px;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-2) 100%);
    color: #fff;
    padding: 56px 64px 40px;
    position: relative;
    border-bottom: 6px solid var(--orange);
  }
  .eyebrow {
    font-family: 'GT America', 'Pretendard', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .title {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.3;
  }
  .date-range {
    margin-top: 16px;
    font-size: 24px;
    font-weight: 500;
    color: #e3c6f0;
  }
  .body {
    flex: 1;
    padding: 40px 64px 0;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 32px 30px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 18px;
  }
  .tag {
    font-family: 'GT America', 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 999px;
  }
  .section.retail .tag { background: var(--retail-bg); color: var(--retail); }
  .section.other .tag { background: var(--other-bg); color: var(--other); }
  .items {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
    justify-content: flex-start;
  }
  .item {
    display: flex;
    gap: 14px;
  }
  .item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 10px; flex-shrink: 0;
  }
  .section.retail .item .dot { background: var(--purple); }
  .section.other .item .dot { background: var(--orange); }
  .item-body { flex: 1; }
  .item-headline {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .item-summary {
    font-size: 16px;
    color: var(--sub);
    line-height: 1.5;
  }
  .item-source {
    font-size: 13px;
    color: #97a0b3;
    margin-top: 4px;
  }
  .footer {
    padding: 24px 64px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #9aa3b5;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">WEEKLY HR TREND REPORT</div>
      <div class="title">노사동향 주간 리포트</div>
      <div class="date-range">{{DATE_RANGE}}</div>
    </div>
    <div class="body">
      <div class="section retail">
        <div class="section-title">🏬 유통업계 <span class="tag">RETAIL</span></div>
        <div class="items">
          <div class="item">
            <div class="dot"></div>
            <div class="item-body">
              <div class="item-headline">예시 헤드라인 항목 1</div>
              <div class="item-summary">여기에 1~2줄 요약 텍스트가 들어갑니다. 자체 요약 문구로 작성.</div>
              <div class="item-source">매체명 · 2026.07.15</div>
            </div>
          </div>
        </div>
      </div>
      <div class="section other">
        <div class="section-title">🏢 타 산업군 <span class="tag">OTHER</span></div>
        <div class="items">
          <div class="item">
            <div class="dot"></div>
            <div class="item-body">
              <div class="item-headline">예시 헤드라인 항목 1</div>
              <div class="item-summary">여기에 1~2줄 요약 텍스트가 들어갑니다. 자체 요약 문구로 작성.</div>
              <div class="item-source">매체명 · 2026.07.16</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      <span>노사동향 위클리</span>
      <span>발행일 {{PUBLISH_DATE}}</span>
    </div>
  </div>
</body>
</html>
